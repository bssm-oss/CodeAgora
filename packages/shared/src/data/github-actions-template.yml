name: CodeAgora Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  review:
    if: "!contains(github.event.pull_request.labels.*.name, 'review:skip')"
    runs-on: ubuntu-latest
    steps:
      # Pin to SHA for production use. Major tags used here for readability.
      - uses: actions/checkout@v6  # Consider SHA pinning for production

      - name: Run CodeAgora review
        uses: bssm-oss/CodeAgora@v0.1.0-rc.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-reject: 'true'
          max-diff-lines: '5000'
          reporter-mode: check-run
          upload-sarif: 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
