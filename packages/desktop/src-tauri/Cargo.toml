[package]
name = "codeagora-desktop"
version = "0.1.0"
edition = "2021"

[features]
webdriver-automation = ["dep:tauri-plugin-webdriver-automation"]

[build-dependencies]
tauri-build = { version = "=2.6.2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
tauri = { version = "=2.11.0", features = [] }
tauri-plugin-dialog = "=2.4.1"
tauri-plugin-notification = "2"
tauri-plugin-window-state = "2"
tauri-plugin-webdriver-automation = { version = "0.1.3", optional = true }
tauri-plugin-mcp-bridge = "0.11.2"
tauri-plugin-updater = "=2.9.0"
tauri-plugin-process = "=2.3.0"
