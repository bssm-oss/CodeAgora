name: CodeAgora Review
# Multi-agent debate-driven code review for pull requests
#
# CONTRACT NOTES:
# - The `review:skip` label is always caller-owned. The Action NEVER mutates skip labels.
# - The action exposes `degraded` and `degraded-reason` outputs for any degraded or skipped run
#   (examples: missing credentials, untrusted context, diff too large, posting failures, stale PR head). Runtime
#   logs and the job summary include the matching reason plus next-step guidance. Loading the
#   repository config uses a default path; failures to load the config are surfaced via degraded
#   outputs but do not change input precedence (CLI > env > default). Provider runtime failures
#   after startup, such as quota, auth, rate-limit, billing, or provider availability failures,
#   are also marked degraded instead of being reported as code-review rejects. When review posting
#   is disabled, the run still executes but is marked degraded. Untrusted fork PRs are always
#   skipped before provider-backed reviewers are invoked.
# - `reporter-mode` selects exactly one GitHub verdict reporter: `check-run` or `commit-status`.
# - GitHub write operations are suppressed after any degraded/untrusted decision. This includes
#   review comments, verdict reporters, reviewer/label mutations, Code Scanning upload, and the
#   SARIF artifact fallback.
#
description: Multi-agent debate-driven code review for pull requests

inputs:
  config-path:
    description: Path to .ca/config.json relative to repo root. CLI flag wins, then $CONFIG_PATH env, otherwise default used.
    required: false
    default: .ca/config.json

  github-token:
    description: GitHub token for posting comments and the configured verdict reporter
    required: true

  fail-on-reject:
    description: Exit with code 1 when verdict is REJECT (blocks merge via required check)
    required: false
    default: 'true'

  max-diff-lines:
    description: Skip review if diff exceeds this line count (0 = unlimited)
    required: false
    default: '5000'

  post-results:
    description: Post review comments and the configured verdict reporter to GitHub
    required: false
    default: 'true'

  reporter-mode:
    description: GitHub verdict reporter to emit when posting is enabled. One of check-run or commit-status.
    required: false
    default: check-run

  check-run-name:
    description: Name of the GitHub check run to create or update for the reviewed PR commit
    required: false
    default: CodeAgora Review

  upload-sarif:
    description: Upload the generated SARIF file to GitHub Code Scanning. The SARIF file is also uploaded as a workflow artifact when Code Scanning upload is disabled or unavailable.
    required: false
    default: 'false'

outputs:
  verdict:
    description: >
      Final verdict — ACCEPT, REJECT, NEEDS_HUMAN, DEGRADED, or SKIPPED.
      DEGRADED is returned if provider/runtime infrastructure prevents a review result.
      SKIPPED is returned if the skip label is present or the run cannot start because
      required credentials are missing.
    value: ${{ steps.review.outputs.verdict }}

  review-url:
    description: URL of the posted GitHub review
    value: ${{ steps.review.outputs.review-url }}

  session-id:
    description: CodeAgora session ID for audit trail
    value: ${{ steps.review.outputs.session-id }}

  sarif-file:
    description: Validated path to the generated SARIF file, when SARIF output was written
    value: ${{ steps.review.outputs.sarif-file }}

  degraded:
    description: >
      Whether the action ran in degraded or skipped mode (true if SKIPPED or degraded).
      Disabled posting, missing credentials, diff limits, provider runtime failures, stale heads,
      config failures, and posting failures set this to true.
    value: ${{ steps.review.outputs.degraded }}

  degraded-reason:
    description: >
      Stable reason code for degraded or skipped mode.
      Values include missing-github-token, untrusted-github-context, missing-provider-secrets,
      untrusted-fork-pr, fork-missing-provider-secrets, posting-disabled, diff-too-large,
      config-load-failed, provider-runtime-failed, stale-head-sha, github-post-failed, and sarif-write-failed.
      Always set if degraded is true.
    value: ${{ steps.review.outputs.degraded-reason }}

  head-sha:
    description: Pull request head SHA reviewed by CodeAgora
    value: ${{ steps.review.outputs.head-sha }}

  base-sha:
    description: Pull request base SHA used for diff acquisition
    value: ${{ steps.review.outputs.base-sha }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Fetch PR diff
      shell: bash
      run: |
        set -euo pipefail

        if ! gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/codeagora-pr.diff; then
          echo "::warning::GitHub API diff retrieval failed; falling back to local git diff."
          if [ -z "$PR_NUMBER" ] || [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ]; then
            echo "::error::Local diff fallback requires a pull_request event with base and head SHAs."
            exit 1
          fi
          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            echo "::error::Local diff fallback requires actions/checkout to run before CodeAgora Review."
            exit 1
          fi
          git cat-file -e "$BASE_SHA^{commit}" || git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git cat-file -e "$HEAD_SHA^{commit}" || git fetch --no-tags --depth=1 origin "pull/$PR_NUMBER/head"
          git cat-file -e "$HEAD_SHA^{commit}" || git fetch --no-tags --depth=1 "https://github.com/$HEAD_REPO.git" "$HEAD_SHA"
          git diff --no-ext-diff --src-prefix=a/ --dst-prefix=b/ "$BASE_SHA...$HEAD_SHA" > /tmp/codeagora-pr.diff
        fi
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}

    - name: Run CodeAgora review
      id: review
      shell: bash
      run: |
        node "$ACTION_PATH/dist/action.js" \
          --diff /tmp/codeagora-pr.diff \
          --pr "$PR_NUMBER" \
          --sha "$HEAD_SHA" \
          --repo "$REPO" \
          --fail-on-reject "$FAIL_ON_REJECT" \
          --max-diff-lines "$MAX_DIFF_LINES" \
          --post-results "$POST_RESULTS" \
          --reporter-mode "$REPORTER_MODE" \
          --check-run-name "$CHECK_RUN_NAME" \
          --base-sha "$BASE_SHA" \
          --base-repo "$BASE_REPO" \
          --head-repo "$HEAD_REPO" \
          --config-path "$CONFIG_PATH"
      env:
        ACTION_PATH: ${{ github.action_path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        REPO: ${{ github.repository }}
        FAIL_ON_REJECT: ${{ inputs.fail-on-reject }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
        POST_RESULTS: ${{ inputs.post-results }}
        REPORTER_MODE: ${{ inputs.reporter-mode }}
        CHECK_RUN_NAME: ${{ inputs.check-run-name }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        CONFIG_PATH: ${{ inputs.config-path }}

    - name: Upload CodeAgora SARIF
      id: upload-codeagora-sarif
      if: ${{ inputs.upload-sarif == 'true' && steps.review.outputs.sarif-file != '' && steps.review.outputs.degraded != 'true' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.review.outputs.sarif-file }}
        category: codeagora

    - name: Upload CodeAgora SARIF artifact fallback
      if: ${{ steps.review.outputs.sarif-file != '' && steps.review.outputs.degraded != 'true' && (inputs.upload-sarif != 'true' || steps.upload-codeagora-sarif.outcome == 'failure') }}
      uses: actions/upload-artifact@v7
      with:
        name: codeagora-sarif
        path: ${{ steps.review.outputs.sarif-file }}
        if-no-files-found: error
        retention-days: 30
