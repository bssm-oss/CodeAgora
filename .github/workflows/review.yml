name: CodeAgora Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  issues: write

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'review:skip')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check fork PR secrets
        id: fork-check
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::warning::Fork PR detected — secrets are unavailable. Skipping review."
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Check API key
        id: key-check
        if: steps.fork-check.outputs.skip != 'true'
        run: |
          if [ -n "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "provider=openrouter" >> "$GITHUB_OUTPUT"
            echo "model=anthropic/claude-sonnet-4.6" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "provider=groq" >> "$GITHUB_OUTPUT"
            echo "model=llama-3.3-70b-versatile" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No supported provider key configured. Add OPENROUTER_API_KEY or GROQ_API_KEY to enable CodeAgora review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.fork-check.outputs.skip != 'true' && steps.key-check.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Generate CI config
        if: steps.fork-check.outputs.skip != 'true' && steps.key-check.outputs.skip != 'true'
        run: |
          mkdir -p .ca
          PROVIDER="${{ steps.key-check.outputs.provider }}"
          MODEL="${{ steps.key-check.outputs.model }}"
          cat > .ca/config.json << 'CONF'
          {
            "mode": "pragmatic",
            "language": "en",
            "reviewers": [
              { "id": "r1", "model": "__MODEL__", "backend": "api", "provider": "__PROVIDER__", "enabled": true, "timeout": 120 }
            ],
            "supporters": {
              "pool": [
                { "id": "s1", "model": "__MODEL__", "backend": "api", "provider": "__PROVIDER__", "enabled": true, "timeout": 120 }
              ],
              "pickCount": 1,
              "pickStrategy": "random",
              "devilsAdvocate": { "id": "da", "model": "__MODEL__", "backend": "api", "provider": "__PROVIDER__", "enabled": true, "timeout": 120 },
              "personaPool": ["builtin:security", "builtin:logic", "builtin:api-contract", "builtin:general"],
              "personaAssignment": "random"
            },
            "moderator": { "model": "__MODEL__", "backend": "api", "provider": "__PROVIDER__" },
            "discussion": { "maxRounds": 1, "registrationThreshold": { "HARSHLY_CRITICAL": 1, "CRITICAL": 1, "WARNING": 2, "SUGGESTION": null }, "codeSnippetRange": 5 },
            "head": { "backend": "api", "model": "__MODEL__", "provider": "__PROVIDER__", "enabled": true },
            "errorHandling": { "maxRetries": 1, "forfeitThreshold": 0.7 }
          }
          CONF
          sed -i.bak "s|__MODEL__|${MODEL}|g; s|__PROVIDER__|${PROVIDER}|g" .ca/config.json
          rm .ca/config.json.bak

      - name: CodeAgora Review
        if: steps.fork-check.outputs.skip != 'true' && steps.key-check.outputs.skip != 'true'
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-reject: 'true'
          max-diff-lines: '250'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CODEAGORA_APP_ID: ${{ secrets.CODEAGORA_APP_ID }}
          CODEAGORA_APP_PRIVATE_KEY: ${{ secrets.CODEAGORA_APP_PRIVATE_KEY }}
