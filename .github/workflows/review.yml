name: CodeAgora Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  issues: write

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'review:skip')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check fork PR secrets
        id: fork-check
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::warning::Fork PR detected — secrets are unavailable. Skipping review."
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Check API key
        id: key-check
        if: steps.fork-check.outputs.skip != 'true'
        run: |
          if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ] && [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "::warning::No API key configured. Set OPENROUTER_API_KEY or GROQ_API_KEY in repo secrets."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.fork-check.outputs.skip != 'true' && steps.key-check.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Generate CI config
        if: steps.fork-check.outputs.skip != 'true' && steps.key-check.outputs.skip != 'true'
        run: |
          mkdir -p .ca
          if [ -n "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            cat > .ca/config.json << 'CONF'
          {
            "mode": "pragmatic",
            "language": "en",
            "reviewers": [
              { "id": "r1", "model": "deepseek/deepseek-v4",  "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 },
              { "id": "r2", "model": "qwen/qwen3-coder",      "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 },
              { "id": "r3", "model": "minimax/minimax-m2.5",  "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 },
              { "id": "r4", "model": "openai/gpt-5-mini",     "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 },
              { "id": "r5", "model": "z-ai/glm-4.6",          "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 }
            ],
            "supporters": {
              "pool": [
                { "id": "s1", "model": "qwen/qwen3.6-plus",   "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 },
                { "id": "s2", "model": "moonshotai/kimi-k2",  "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 }
              ],
              "pickCount": 2,
              "pickStrategy": "random",
              "devilsAdvocate": { "id": "da", "model": "deepseek/deepseek-r1", "backend": "api", "provider": "openrouter", "enabled": true, "timeout": 120 },
              "personaPool": ["builtin:security", "builtin:logic", "builtin:api-contract", "builtin:general"],
              "personaAssignment": "random"
            },
            "moderator": { "model": "deepseek/deepseek-v3.2", "backend": "api", "provider": "openrouter" },
            "discussion": { "maxRounds": 2, "registrationThreshold": { "HARSHLY_CRITICAL": 1, "CRITICAL": 1, "WARNING": 2, "SUGGESTION": null }, "codeSnippetRange": 10 },
            "head": { "backend": "api", "model": "openai/gpt-5.4-mini", "provider": "openrouter", "enabled": true },
            "errorHandling": { "maxRetries": 1, "forfeitThreshold": 0.7 }
          }
          CONF
          else
            cat > .ca/config.json << 'CONF'
          {
            "mode": "pragmatic",
            "language": "en",
            "reviewers": [
              { "id": "r1", "model": "llama-3.3-70b-versatile", "backend": "api", "provider": "groq", "enabled": true, "timeout": 120 },
              { "id": "r2", "model": "llama-3.3-70b-versatile", "backend": "api", "provider": "groq", "enabled": true, "timeout": 120 },
              { "id": "r3", "model": "llama-3.3-70b-versatile", "backend": "api", "provider": "groq", "enabled": true, "timeout": 120 }
            ],
            "supporters": {
              "pool": [
                { "id": "s1", "model": "llama-3.3-70b-versatile", "backend": "api", "provider": "groq", "enabled": true, "timeout": 120 }
              ],
              "pickCount": 1,
              "pickStrategy": "random",
              "devilsAdvocate": { "id": "da", "model": "llama-3.3-70b-versatile", "backend": "api", "provider": "groq", "enabled": true, "timeout": 120 },
              "personaPool": ["builtin:security", "builtin:logic", "builtin:api-contract", "builtin:general"],
              "personaAssignment": "random"
            },
            "moderator": { "model": "llama-3.3-70b-versatile", "backend": "api", "provider": "groq" },
            "discussion": { "maxRounds": 2, "registrationThreshold": { "HARSHLY_CRITICAL": 1, "CRITICAL": 1, "WARNING": 2, "SUGGESTION": null }, "codeSnippetRange": 10 },
            "head": { "backend": "api", "model": "llama-3.3-70b-versatile", "provider": "groq", "enabled": true },
            "errorHandling": { "maxRetries": 1, "forfeitThreshold": 0.7 }
          }
          CONF
          fi

      - name: CodeAgora Review
        if: steps.fork-check.outputs.skip != 'true' && steps.key-check.outputs.skip != 'true'
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-reject: 'true'
          max-diff-lines: '5000'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CODEAGORA_APP_ID: ${{ secrets.CODEAGORA_APP_ID }}
          CODEAGORA_APP_PRIVATE_KEY: ${{ secrets.CODEAGORA_APP_PRIVATE_KEY }}
