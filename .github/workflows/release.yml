name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test --no-file-parallelism

      # Smoke test: pack and verify CLI works
      - name: Smoke test
        run: |
          npm pack
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y
          npm i $GITHUB_WORKSPACE/codeagora-review-*.tgz
          npx agora --version
          npx agora doctor || echo "::warning::doctor check failed (expected without API keys)"

      # Publish review package
      - name: Publish @codeagora/review
        id: publish-core
        continue-on-error: true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @codeagora/mcp
        id: publish-mcp
        continue-on-error: true
        run: cd packages/mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        if: always()
        run: |
          failed=0
          for result in \
            "${{ steps.publish-core.outcome }}" \
            "${{ steps.publish-mcp.outcome }}"; do
            if [ "$result" = "failure" ]; then
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed package(s) failed to publish"
            exit 1
          fi
          echo "All packages published successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
