name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test --no-file-parallelism
      - name: Web package tests
        run: pnpm test:web

      - name: Determine npm dist-tag
        id: dist-tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == *-* ]]; then
            tag="${version#*-}"
            tag="${tag%%.*}"
          else
            tag="latest"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify package surface
        run: |
          node -e "const pkg=require('./package.json'); if (pkg.name !== '@codeagora/review') throw new Error('root package must publish as @codeagora/review')"
          node -e "const pkg=require('./packages/mcp/package.json'); if (pkg.name !== '@codeagora/mcp') throw new Error('MCP package must publish as @codeagora/mcp')"

      # Smoke test: pack and verify public packages work from a clean install
      - name: Smoke test
        run: |
          CLI_TARBALL="$(npm pack --silent)"
          MCP_TARBALL="$(cd packages/mcp && npm pack --silent)"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y
          npm i "$GITHUB_WORKSPACE/$CLI_TARBALL" "$GITHUB_WORKSPACE/packages/mcp/$MCP_TARBALL"
          npx agora --version
          npx agora doctor || echo "::warning::doctor check failed (expected without API keys)"
          npx codeagora-mcp --help

      - name: Publish @codeagora/review
        id: publish-review
        continue-on-error: true
        run: npm publish --access public --tag "${{ steps.dist-tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @codeagora/mcp
        id: publish-mcp
        continue-on-error: true
        run: cd packages/mcp && npm publish --access public --tag "${{ steps.dist-tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        if: always()
        run: |
          failed=0
          for result in \
            "${{ steps.publish-review.outcome }}" \
            "${{ steps.publish-mcp.outcome }}"; do
            if [ "$result" = "failure" ]; then
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed package(s) failed to publish"
            exit 1
          fi
          echo "All packages published successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
