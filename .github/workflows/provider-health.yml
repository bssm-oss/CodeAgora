name: Provider Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # doctor --live runs its base environment checks first (.ca/ dir,
      # config file, API keys, CLIs). Those checks are meaningful for
      # user environments but not in CI — the workspace is intentionally
      # missing .ca/ (gitignored) and most CLIs. Write a minimal config
      # so the env checks pass and the run's exit code reflects only the
      # live provider pings we actually care about.
      - name: Generate stub config for doctor
        run: |
          mkdir -p .ca
          cat > .ca/config.json << 'CONF'
          {
            "mode": "pragmatic",
            "language": "en",
            "reviewers": [
              {
                "id": "r1",
                "model": "qwen/qwen3-235b-a22b-2507",
                "backend": "api",
                "provider": "openrouter",
                "enabled": true,
                "timeout": 120
              }
            ],
            "moderator": { "model": "qwen/qwen3-235b-a22b-2507", "backend": "api", "provider": "openrouter" },
            "head": { "backend": "api", "model": "qwen/qwen3-235b-a22b-2507", "provider": "openrouter", "enabled": true },
            "supporters": {
              "pool": [
                {
                  "id": "s1",
                  "model": "openai/gpt-oss-120b",
                  "backend": "api",
                  "provider": "openrouter",
                  "enabled": true,
                  "timeout": 120
                }
              ],
              "pickCount": 1,
              "pickStrategy": "random",
              "devilsAdvocate": {
                "id": "da",
                "model": "deepseek/deepseek-v4-flash",
                "backend": "api",
                "provider": "openrouter",
                "enabled": true,
                "timeout": 120
              },
              "personaPool": ["safety", "security", "maintainer"],
              "personaAssignment": "random"
            },
            "discussion": {
              "enabled": true,
              "maxRounds": 3,
              "registrationThreshold": {
                "HARSHLY_CRITICAL": 1,
                "CRITICAL": 1,
                "WARNING": 2,
                "SUGGESTION": null
              },
              "codeSnippetRange": 10,
              "objectionTimeout": 60,
              "maxObjectionRounds": 1
            },
            "errorHandling": {
              "maxRetries": 1,
              "forfeitThreshold": 0.7
            }
          }
          CONF

      - name: Ping Tier 1 providers
        id: health
        continue-on-error: true
        run: node packages/cli/dist/index.js doctor --live
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Create issue on failure
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Provider health check failed (${date})`,
              body: `Weekly provider health check detected failures.\n\nSee [workflow run](${runUrl}) for details.`,
              labels: ['bug', 'provider']
            });
