name: PR Size Label

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.issue.number;

            const { data: files } = await github.rest.pulls.listFiles({ owner, repo, pull_number: pr });
            const changes = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];
            const label =
              changes < 10 ? 'size/XS' :
              changes < 50 ? 'size/S' :
              changes < 200 ? 'size/M' :
              changes < 500 ? 'size/L' : 'size/XL';

            const { data: current } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: pr });
            const keep = current.map(l => l.name).filter(n => !sizeLabels.includes(n));

            await github.rest.issues.setLabels({ owner, repo, issue_number: pr, labels: [...keep, label] });
            console.log(`PR #${pr}: ${changes} changes → ${label}`);
