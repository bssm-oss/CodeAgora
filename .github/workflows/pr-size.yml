name: PR Size Label

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const changes = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            const labels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];
            let label;
            if (changes < 10) label = 'size/XS';
            else if (changes < 50) label = 'size/S';
            else if (changes < 200) label = 'size/M';
            else if (changes < 500) label = 'size/L';
            else label = 'size/XL';

            const current = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const l of current.data) {
              if (labels.includes(l.name) && l.name !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: l.name,
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

            console.log(`PR #${context.issue.number}: ${changes} changes -> ${label}`);
